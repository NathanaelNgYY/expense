name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Dependency audits only catch new CVEs if they run when nothing is being pushed.
  schedule:
    - cron: '0 2 * * 1' # Mondays, 02:00 UTC

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: 8.30.1

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # gitleaks scans the whole history, not just the tip commit

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # The ingest Edge Function runs on Deno and imports from src/ (npm: specifiers,
      # .ts extensions). tsc cannot check it, so nothing did — a change to src/types.ts
      # could break ingestion in production with CI still green.
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Typecheck Supabase Edge Functions
        run: npm run typecheck:functions

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build production bundle
        run: npm run build

      - name: Check initial bundle size
        run: npm run size

      # The dependency tree is currently clean. Any future high/critical advisory
      # must fail the verify job instead of being reported as a warning.
      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Scan history for secrets
        run: gitleaks git . --redact --no-banner

  # Isolation between users rests entirely on RLS. This job proves the policies
  # hold against a real Postgres with every migration applied — the same schema a
  # fresh production deploy produces. Parallel to `verify` so it does not slow
  # down pull requests that never touch the database.
  rls:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Supabase CLI
        # v2 runs on Node 24 and reads the CLI version from package-lock.json.
        uses: supabase/setup-cli@v2

      - name: Start local Supabase stack
        # Applies every migration in supabase/migrations in order.
        run: supabase start

      - name: Run live RLS isolation tests
        run: npm run test:rls

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop

  # These journeys exercise the real mobile UI in a browser. Supabase requests are
  # deliberately blocked and fixtures live in localStorage, so CI cannot mutate a
  # deployed environment and offline-first behavior stays deterministic.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run mobile browser and accessibility checks
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
