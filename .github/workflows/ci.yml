name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Dependency audits only catch new CVEs if they run when nothing is being pushed.
  schedule:
    - cron: '0 2 * * 1' # Mondays, 02:00 UTC

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: 8.30.1

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # gitleaks scans the whole history, not just the tip commit

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # The ingest Edge Function runs on Deno and imports from src/ (npm: specifiers,
      # .ts extensions). tsc cannot check it, so nothing did — a change to src/types.ts
      # could break ingestion in production with CI still green.
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Typecheck Supabase Edge Functions
        run: npm run typecheck:functions

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build production bundle
        run: npm run build

      - name: Check initial bundle size
        run: npm run size

      # Non-blocking for now: 10 findings exist as of 2026-07-13 (1 low, 7 moderate, 2 high).
      # Once the 2 highs are cleared, drop continue-on-error to make regressions fail CI.
      - name: Audit dependencies
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Scan history for secrets
        run: gitleaks git . --redact --no-banner
